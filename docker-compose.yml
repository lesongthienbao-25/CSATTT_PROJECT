services:
  db:
    image: postgres:15
    container_name: corpvuln_db
    restart: always
    environment:
      POSTGRES_DB: corpvuln
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - corpnet

  backend:
    build: ./backend
    container_name: corpvuln_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/corpvuln
    volumes:
      - ./secrets:/app/secrets
    depends_on:
      - db
    networks:
      - corpnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: corpvuln_frontend
    ports:
      - "3000:3000"
    restart: always
    networks:
      - corpnet

  nginx:
    image: nginx:alpine
    container_name: corpvuln_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - corpnet

volumes:
  pgdata:

networks:
  corpnet:
    driver: bridge
